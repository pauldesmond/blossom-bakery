    .not-found { text-align: center; padding: clamp(80px, 12vw, 160px) 0; }

    .not-found__lede { font-size: 1.05rem; color: var(--muted); max-width: 480px; margin: 0 auto 32px; line-height: 1.7; }
    .not-found__back { display: inline-block; padding: 14px 28px; border-radius: 999px; background: var(--rose-dark); color: var(--cream); font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; letter-spacing: 0.04em; text-decoration: none; transition: background 0.18s; }
    .not-found__back:hover { background: #b85b5e; }
  </style>
</head>

  <a href="#main" class="skip-link">Skip to content</a>
