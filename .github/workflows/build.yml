name: Build static HTML on content change

on:
  push:
    branches: [main]
    paths:
      - '_pages/**'
      - '_data/**'
      - 'scripts/build.py'
      - 'styles.css'
      - '.github/workflows/build.yml'
  # Also allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'  # don't loop on our own commits

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml beautifulsoup4

      - name: Build pages
        run: python3 scripts/build.py

      - name: Commit regenerated HTML
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add *.html
          if git diff --cached --quiet; then
            echo "No HTML changes to commit."
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "build: regenerate HTML from content [skip ci]"
            # Belt-and-braces against remote drift between checkout and
            # push — busy editing sessions land multiple commits on main
            # during a single build, so plain `git push` gets rejected
            # with "fetch first" and the build-failure email goes out
            # for no real reason. --rebase replays our build commit on
            # top of whatever landed in the meantime.
            for attempt in 1 2 3; do
              if git push; then break; fi
              echo "push attempt $attempt rejected — rebasing on origin/main"
              git pull --rebase origin main
            done
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Ping IndexNow (streaming, one URL per request)
        if: steps.commit.outputs.changed == 'true'
        run: ./scripts/indexnow.sh --all
