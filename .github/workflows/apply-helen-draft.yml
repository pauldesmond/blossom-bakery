name: Apply Helen's draft (publish)

# Triggered by the Supabase publish-draft edge function via workflow_dispatch.
# Three modes (in order of preference):
#   - draft_path set: read the staged draft file, apply, delete the file
#     (the post-2026-05-10 path — supports image swaps without 65KB cap)
#   - draft_b64 set: legacy base64-in-input path, kept for back-compat
#   - revert_sha set: git revert that SHA, push (used by the editor's
#     "undo last publish" button)
#
# Aborts if apply-draft.py reports a YAML-mirror miss for scones/about —
# without that guard CI's build.py would silently overwrite Helen's edit
# on the next run.

on:
  workflow_dispatch:
    inputs:
      draft_path:
        description: 'Path to a staged draft JSON inside the repo'
        required: false
        default: ''
      draft_b64:
        description: 'Base64 of the draft JSON (legacy path)'
        required: false
        default: ''
      message:
        description: 'Short description of what Helen changed'
        required: false
        default: ''
      revert_sha:
        description: 'Commit SHA to revert (alternative to draft inputs)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  apply:
    if: ${{ inputs.revert_sha == '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Configure git
        run: |
          git config user.name "blossom-publish-bot"
          git config user.email "blossom-publish-bot@users.noreply.github.com"
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: pip install pyyaml beautifulsoup4
      - name: Resolve draft (file path or base64 input)
        run: |
          mkdir -p /tmp/blossom
          if [ -n "${{ inputs.draft_path }}" ]; then
            if [ ! -f "${{ inputs.draft_path }}" ]; then
              echo "::error::draft_path '${{ inputs.draft_path }}' not found in repo"
              exit 1
            fi
            cp "${{ inputs.draft_path }}" /tmp/blossom/draft.json
            # Stage the staging-file deletion so it lands in the same publish commit.
            git rm -f "${{ inputs.draft_path }}"
          elif [ -n "${{ inputs.draft_b64 }}" ]; then
            printf '%s' "${{ inputs.draft_b64 }}" | base64 -d > /tmp/blossom/draft.json
          else
            echo "::error::Neither draft_path nor draft_b64 provided"
            exit 1
          fi
          python -c "import json; json.load(open('/tmp/blossom/draft.json'))"
      - name: Apply draft (fail loud on YAML miss)
        run: |
          set -o pipefail
          python scripts/apply-draft.py /tmp/blossom/draft.json 2>&1 | tee /tmp/blossom/output.txt
          if grep -q "YAML mirror MISSED" /tmp/blossom/output.txt; then
            echo "::error::YAML mirror miss for a generated page (scones/about). Refusing to publish — message Paul to hand-fix."
            exit 1
          fi
      - name: Commit and push
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "Nothing to publish."
            exit 0
          fi
          MSG="${{ inputs.message }}"
          [ -z "$MSG" ] && MSG="helen's edits"
          git commit -m "publish: $MSG"
          git push

  revert:
    if: ${{ inputs.revert_sha != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: Configure git
        run: |
          git config user.name "blossom-publish-bot"
          git config user.email "blossom-publish-bot@users.noreply.github.com"
      - name: Revert and push
        run: |
          SHA="${{ inputs.revert_sha }}"
          # Already reverted? Look for "Revert ... <sha>" or "This reverts commit <sha>"
          # in any commit message since SHA. If found, treat as already-done success.
          if git log "$SHA"..HEAD --pretty=%B 2>/dev/null | grep -qE "^This reverts commit $SHA"; then
            echo "::notice::Commit $SHA was already reverted — nothing to do."
            exit 0
          fi
          # Try revert. If it fails because the diff is empty (changes already
          # undone manually), exit success with a notice instead of erroring.
          if ! git revert --no-edit "$SHA" 2>/tmp/revert.err; then
            cat /tmp/revert.err
            if grep -qiE "nothing to commit|empty|previous cherry-pick" /tmp/revert.err; then
              echo "::notice::Nothing to revert for $SHA — its changes are already absent."
              git revert --abort 2>/dev/null || true
              exit 0
            fi
            echo "::error::git revert failed. Probable conflict — needs manual resolution."
            exit 1
          fi
          git push
