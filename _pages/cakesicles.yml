intro: Cakesicles – Blossom Bakery Skip to content Cakesicles…fancy cakes on sticks. Do you want something a bit different and eye catching? Not only do they look fab, they taste great too! Choose from a variety of different flavoured cake, chocolate and designs. All our cakesicles are individually wrapped and tied with ribbon. Prices start from £20 for a box of 4. Privacy Blossom Bakery
