title: About Helen
intro: Our Story… – Blossom Bakery Skip to content Hi, I’m Helen. Previously a visual merchandising manager for a high street fashion retailer, I became a full-time Mum in 2014. I’ve always loved baking since I was a child, helping my Cornish Nan bake cakes in her kitchen. These days I find baking is my way to relax and it allows me to express my creative side. In 2016 I decided not to return back into retail, and instead I took a part-time job in a local family run tea room. I loved baking for them as it was so rewarding to hear the customers speak fondly about how everything tasted. In 2018 we set up Blossom Bakery, inspired by a trip to Japan where I fell in love with the Japanese cherry blossoms. We registered the business with our local council and obtained our five-star hygiene rating.
