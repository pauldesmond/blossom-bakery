title: Cakes
intro: 'At Blossom Bakery we offer an extensive range of different cake designs and flavours. We use what we believe are the best ingredients available to deliver you that truly unforgettable cake. Where we can, we try to shop locally for our produce, and we always use free-range eggs. Our cakes are available in 3 different sizes. Ten inch , serving 14-16 people, Eight inch, serving 12-14 people, Six inch serving 10-12 people. Our cakes are available gluten-free (GF) on request, and many can be adapted for vegan diets (V).We can also combine gluten-free and vegan (GF & V). To add that personal touch why not add a topper to your Specialty cake. Our acrylic cake toppers can be personalised with your message and are available in a range of colours. Chocolate and coffee flavoured sponge. Sandwiched between a layer of coffee buttercream with a milk chocolate ganache top, chocolate buttercream and chocolate flakes. (GF & V) Price: 8-inch £45, 6-inch £40 Lemon flavoured sponge decorated with lemon buttercream, lemon curd and fresh lemon slices. Add blueberries for an additional cost. (GF & V) Price: 8-inch £45, 6-inch £40 Lime flavoured sponges with lemon curd, lemon buttercream. Decorated on top with lime buttercream and fresh lime slices. (GF & V) Price: 8-inch £45,  6-inch £40 Almond flavoured sponge sandwiched between cherry jam and almond buttercream. Decorated with almond buttercream and glacé cherries. (GF & V) Price: 8-inch £45, 6-inch £40 A lovely spiced carrot cake with walnuts and sultanas. Mascarpone frosting, topped with walnuts and fondant carrots. (GF & V) Price: 8-inch £45,  6-inch £40 Raspberry flavoured sponge with lemon buttercream and lemon curd. Decorated with raspberry buttercream and homemade raspberry meringue kisses. (GF) Price: 8-inch £50,  6-inch £45 Coffee and walnut sponge sandwiched between coffee buttercream and topped with chopped walnuts. (GF & V) Price: 8-inch £45,  6-inch £40 Vanilla sponge sandwiched between strawberry jam and vanilla butter cream. Decorated with fresh strawberries. This cake can also be made with fresh cream instead of buttercream. (GF & V) Price: 8-inch £45 6-inch £40 Maple sponge with chopped pecan nuts. Sandwiched between maple buttercream and chopped pecan nuts. (GF & V) Price: 8-inch £45,  6-inch £40 Red Velvet sponge with white chocolate buttercream. (GF & V) Price: 8-inch £45,  6-inch £40 Lemon sponges sandwiched between a layer of lemon curd and lemon buttercream. Topped with homemade lemon meringue kisses and lemon buttercream. Price: 8-inch £45, 6-inch £40 Chocolate sponge sandwiched between a layer of black cherry jam and vanilla buttercream. Decorated with glacé cherries and milk chocolate shavings. This cake can also be made with fresh cream instead of buttercream. (GF & V) Price: 8-inch £45,  6-inch £40 Coconut sponge with pineapple jam, Jamaican rum buttercream and coconut. (GF & V) Price: 8-inch £45, 6 inch £40 Chocolate orange sponge with orange buttercream and decorated with Terry‘s chocolate orange segments. Price: 8-inch £45,  6-inch £40 Chocolate sponge with peppermint buttercream. Decorated with Aero chocolate balls and chocolate chunks. Price: 8-inch £45,  6-inch £40 Strawberry flavoured sponge with strawberry jam and clotted cream buttercream. Decorated with Lindt white chocolates. Price: 8-inch £50,  6-inch £45 Oreo cookie sponge with Oreo cookie buttercream decorated with Oreo biscuits. Price: 8-inch £45,  6-inch £40 Pistachio sponge sandwiched between delicate rose flavoured buttercream, sprinkled with pistachio nuts on top. (GF & V) Price: 8-inch £45, 6-inch £40 Salted caramel sponge with salted caramel ganache. Decorated with salted caramel chocolates and fudge pieces. Price: 8-inch £50,  6-inch £45 Cinnamon sponge with Lotus Biscoff buttercream. Decorated with Biscoff biscuits. Price: 8-inch £45, 6-inch £40 Banana flavoured sponge with homemade caramel sauce and caramel buttercream. Decorated with Cadbury''s milk chocolate caramel. Price: 8-inch £45, 