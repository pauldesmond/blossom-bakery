intro: Cakes – Blossom Bakery Skip to content At Blossom Bakery we offer an extensive range of different cake designs and flavours. We use what we believe are the best ingredients available to deliver you that truly unforgettable cake. Where we can, we try to shop locally for our produce, and we always use free-range eggs. Our cakes are available in 3 different sizes. Ten inch , serving 14-16 people, Eight inch, serving 12-14 people, Six inch serving 10-12 people. Our cakes are available gluten-free (GF) on request, and many can be adapted for vegan diets (V). We can also combine gluten-free and vegan (GF & V). To add that personal touch why not add a topper to your Specialty cake. Our acrylic cake toppers can be personalised with your message and are available in a range of colours.
