title: Catering Packages
intro: Catering Packages – Blossom Bakery Skip to content Whether its for an office business lunch, special birthday party, children’s party or a family gathering, we can take the stress out by working out a catering package for you. Choose from a selection of sandwich platters, wraps, homemade sausages rolls, homemade quiche, cakes, biscuits, scones, brownies or tarts. We can cater for Vegetarian, Gluten-Free, Dairy-Free and/ or Vegan diets. Please contact us for more information on our different packages – prices start from £8 per person. u Privacy Blossom Bakery
