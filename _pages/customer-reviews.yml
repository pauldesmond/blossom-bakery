slug: customer-reviews
title: Testimonials
intro: We pride ourselves on creating an exceptional customer service and are always pleased to receive feedback on your experience. Please see below for some of our latest reviews…To review more of our 5 Star reviews please see our reviews on Google. Helen made this beautiful cake for my Daughters birthday. The cake was absolutely stunning and tasted delicious too! I would recommend Blossom Bakery without hesitation. 😊 Serena, Great Baddow An amazing cake for our daughters 21st birthday. We've just tucked into it and it's delicious. Alison, Galleywood After posting on Facebook, Blossom Bakery was recommended more than once. Friendly customer service, the biscuits were perfect and tasted amazing. Will certainly be back. Thanks again. X Raymanda, Galleywood Ordered a Millionaires traybake as a lockdown treat and could absolutely not fault anything. Delicious cake and fab customer service! Iona, Great Baddow Such a wonderful cake for my son's 3rd birthday. It looked absolutely incredible and it tasted delicious too. Would definitely recommend Blossom Bakery 5 stars and 5 star service. Emily, Beaulieu Park I ordered a Red Velvet cake for my daughters birthday. Also some fruit scones, cupcakes and a quiche. They were all absolutely lovely. Thank you so much. We will definitely order again from Blossom Bakery and would highly recommend. Rebecca, Beaulieu Park I ordered a chocolate millionaires shortbread for our birthday weekend.. absolutely amazing.. cannot recommend Blossom Bakery enough! It looked amazing, and tasted just as it looked!!! Eileen, Great Baddow I asked Helen to make me a selection of cakes, biscuits, scones and a quiche for an afternoon tea , to deliver & share with family and extended family. Wow! It was amazing, a fabulous lemon cake, mini Victoria sponges , scones and Viennese whirls which were to die for. Top quality and superb value. I can't recommend Blossom Bakery highly enough. Fabulous bakes and highly professional service. Carolyn, Chelmsford I asked a Helen to make a cake for my Mums 70th. It was absolutely stunning, very intricate and got amazing compliments. Thank you so much, will be coming back! Jo, Chelmsford We ordered two cakes for a birthday & anniversary. A Victoria Sponge and a Coffee & Walnut. OMG they were amazing. Thank you so much! Xx Donna, Felsted I'm always worried about ordering cakes because we are vegan and also have family members that are gluten intolerant. Previously I've ordered cakes from bakers and they've either been refused or they tasted very strongly of baking powder. This cake was a triumph, so much so we look forward to ordering another one very soon. I highly recommend Blossom Bakery. Rebecca, Danbury Helen made a fabulous cake for my mum's birthday. Great communication and it tasted wonderful. Everyone loved it – I've never seen a cake disappear so fast at a party! Karen, Great Baddow I ordered an old school sprinkle traybake for my husbands birthday. Service was great and it looked and tasted delicious. Emma, Galleywood
