title: Scones
intro: Scones – Blossom Bakery Skip to content We have been mastering our scone recipes for a while now, and are really proud of the quality and flavour that we achieve. Our generously sized scones come in many varieties of unforgettable sweet and savoury flavours. Gluten-free scones are available across all of our flavours (GF) on request. A selection of scones can also be adapted for vegan diets (V). Scones can be ordered in quantities of 7 or 15. When ordering scones please note that flavours need to be ordered in quantities of 7 or 15. We aren’t able to make single flavours. Prices are per scone.
