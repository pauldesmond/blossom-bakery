slug: scones
title: Scones
intro: We've been mastering our scone recipes for a while now, and are really proud of the quality and flavour we achieve. Generously sized, in many varieties of sweet and savoury. Gluten-free is available on request across the range, and selected flavours can be adapted for vegan diets. Scones are ordered in quantities of 7 or 15 — flavours need to be ordered in those quantities, we can't do single flavours. Prices are per scone.
