slug: afternoon-teas
title: Afternoon Tea
intro: Our afternoon teas are perfect for all types of celebrations. They are perfect to share with friends and family and make perfect picnics. We can also cater for larger functions and parties and add additional savoury options. We offer a wide range of different types of Afternoon Teas. Traditional, personalised, savoury, Vegetarian, gluten free and Vegan afternoon tea. We also make a lovely Children's afternoon tea. Our sweet treat boxes, cake boxes and cream teas are also very popular. Please pre-order with 48 hours notice. We offer a local CM2 delivery for afternoon teas for 2 People or more. Enjoy a selection of dainty finger sandwiches with Cumberland sausage rolls, freshly baked plain/fruit scones served with Cornish clotted cream and strawberry jam. To finish off a selection of small cakes, cookies and macarons/ meringue kisses. Our small cake selection changes each week depending on what we are baking at the time of your order. Traditional afternoon tea for two Enjoy a selection of dainty finger sandwiches with Cumberland sausage rolls, freshly baked plain/fruit scones served with Cornish clotted cream and strawberry jam. To finish off a selection of small cakes, including personalised cupcakes, cookies and macarons/ meringue kisses. Our small cake selection changes each week depending on what we are baking at the time of your order. Personalised afternoon tea for two Enjoy a selection of Dainty finger sandwiches with Cumberland sausage rolls, matured cheese & smoked bacon quiche and scotch eggs. Freshly baked plain/fruit scones served with Cornish clotted cream and strawberry jam. Finished off with a slice of cake. Savoury afternoon tea for two Finger sandwiches, on either white or wholemeal bread. Choose from ham, cheese, jam or chocolate spread. Sausage rolls, finished off with a selection of small cakes, cookies, marshmallows and chocolates. Children's afternoon tea for two. Enjoy a selection of dainty vegan sandwiches consisting of roasted red pepper & avocado, vegan cheese & cucumber and vegan cheese & caramelised onion chutney. Vegan fruit scone, dairy-free spread & strawberry jam, vanilla cupcake and cookies. Vegan afternoon tea for one A selection of cakes, tart, cookies, macaroons/ meringue kisses. Your sweet treat box also includes a personalised cupcake. Sweet treat box for one person. A selection of cakes, tart, cookies, macaroons/ meringue kisses. Your sweet treat box also includes a personalised cupcake. Freshly baked scone served with Cornish clotted cream and strawberry jam. Sweet treat box for one person. A selection of cakes, macaroons and meringue kisses. Your cake box also includes personalised cupcakes. Two generous sized plain or fruit scones served with Cornish clotted cream, jam and fresh strawberries..
