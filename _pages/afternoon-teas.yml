intro: Afternoon Tea – Blossom Bakery Skip to content Screenshot Our afternoon teas are perfect for all types of celebrations. They are perfect to share with friends and family and make perfect picnics. We can also cater for larger functions and parties and add additional savoury options. We offer a wide range of different types of Afternoon Teas. Traditional, personalised, savoury, Vegetarian, gluten free and Vegan afternoon tea. We also make a lovely Children’s afternoon tea. Our sweet treat boxes, cake boxes and cream teas are also very popular. Please pre-order with 48 hours notice. We offer a local CM2 delivery for afternoon teas for 2 People or more.
