title: Giant Cookies
intro: Giant Cookies – Blossom Bakery Skip to content Our giant cookies are a great alternative to a cake, perfect for any special occasion. They make lovely gifts. Our cookie recipe is delicious soft and chewy. All our cookies are round-shaped and are 11cm in diameter. Choose from milk, white or dark chocolate chunks. We have a wide range of different colour themes, buttercreams, sprinkles, chocolates and sugar crafted flowers. Our giant cookies start from £30. All our cookies come with a stamped personalised message in the centre. Let us know your personal message and we will create it for you. All of our giant cookies come boxed. Gluten-free and vegan options available. Privacy Blossom Bakery
