title: Buttercream Flower Cakes
intro: Buttercream Flower Cakes – Blossom Bakery Skip to content Beautifully handcrafted buttercream cakes for that special occasion Our stunning buttercream flower cakes are made with Swiss buttercream. We create large roses, buds, carnations and hydrangea flowers and leaves with piped buttercream. They really look fabulous on this spectacular cake. We can create a variety of colour themes and flavours. We also make number shaped cakes for speciality birthdays. Prices start from £70. We can also create personalised pretty buttercream flower cakes Privacy Blossom Bakery
