slug: ganache-drip-cakes
title: Ganache Drip Cakes
intro: Tall 6 inch & Drip Cakes – Blossom Bakery Skip to content Tall/Drip cakes are one of the latest trends for celebration style cakes at the moment. Our 6 inch tall cakes are generally made with 3-4 layers of sponge and filled with buttercream, jam or curd depending on the flavour. If cut correctly these can feed 25 people. We can also make 8 inch cakes which serving around 30 people. These cakes can be decorated to pretty much any theme. Adding a wide range of decorations including fresh/ artificial & dried flowers. Chocolates, sweets, macarons, small bottles of fizz/gin and fresh fruit. If you’d like to add a personal message to your cake we make personalised acrylic toppers to coordinate with your cake. These can be added to your order for an additional £6.
