slug: childrens-cakes
title: Children's Cakes
intro: Children’s cakes – Blossom Bakery Skip to content The smile on the face of a child is magical when they get to see their birthday cake. Something that we want to remember and treasure for years. We make a wide range of children’s cakes; everything from Paw Patrol, Princess Castles, Football Clubs, Unicorn, Frozen, Mermaid, Spider-Man, Toy Story – the list really is endless. Cupcakes for party bags can also be made to co-ordinate with your cake. If you are celebrating two birthdays with one celebration cake how about a half-and-half cake? Just send us the theme that you’d like to create along with how many people you need the cake to feed. The date your cake is required and we will pull together a quote for you. Privacy Blossom Bakery
