slug: cupcakes
title: Cupcakes
intro: 'Cupcakes are fantastic for all sorts of occasions and are a lovely way to share some happiness around. They are ideal as gifts for friends/family and perfect for children''s birthday parties. Choose from our wide range of designs and delicious flavours. Our cupcakes can all be made gluten-free on request, and selected cupcakes for vegan diets. All of our cupcakes are packaged in cupcake gift boxes, in quantities of six, twelve, eighteen or twenty-four. Prices start from £25. Prices start from £20 for a box of six cupcakes and go up in price depending on the design and detail We also make a beautiful range of cupcake bouquets. Cupcakes with hand pipped buttercream flowers with a central personalised message. Available in a range of different colour themes. Your bouquet is wrapped in tissue paper with cellophane and tied with satin ribbon. Price: 7 cupcakes £40 12 cupcakes £60 The classic 99 ice cream cone cakes are great fun for children. Wafer cones filled with vanilla or chocolate sponge and topped with a swirl of buttercream and finished off with a Cadbury''s chocolate flake & sprinkles. £25- Box of six'
