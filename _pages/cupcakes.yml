title: Cupcakes
intro: Cupcakes – Blossom Bakery Skip to content Cupcakes are fantastic for all sorts of occasions and are a lovely way to share some happiness around. They are ideal as gifts for friends/family and perfect for children’s birthday parties. Choose from our wide range of designs and delicious flavours. Our cupcakes can all be made gluten-free on request, and selected cupcakes for vegan diets. All of our cupcakes are packaged in cupcake gift boxes, in quantities of six, twelve, eighteen or twenty-four. Prices start from £25. Prices start from £20 for a box of six cupcakes and go up in price depending on the design and detail We also make a beautiful range of cupcake bouquets. Cupcakes with hand pipped buttercream flowers with a central personalised message.
