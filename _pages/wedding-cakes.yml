slug: wedding-cakes
title: Wedding Cakes
intro: Having recently married Myself in October 2024 i completely understand more than ever how important you want your special day to be. Not only do you need your Wedding cake to look perfect, it needs to taste delicious too! Your experience deciding on the cake design and flavours should be a pleasurable , enjoyable and most importantly a stress free experience. That's where I can help you. I am professional, approachable, accommodating and will communicate with you all the way through the process. Please do take a look at some of my favourite cakes in my gallery. I've delivered and set up cakes in some beautiful venues including Gosfield Hall, Roslin beach hotel , Maidens barn, Hylands House, Braxted Park, Apton hall, Baddow park, Crondon park, Lezz Priory, and Channels. We know that the perfect wedding cake is an integral part of your special day, and not only does it need to look spectacular it also needs to taste delicious! If the traditional tiered wedding cake isn't for you maybe a selection of sweet treats combined with a smaller cake? We make a large selection of brownies, millionaire shortbread, cookies, cupcakes, blondies and iced personalised biscuits. We also hire out our Sweet treat stand for a small fee. Pricing depends on how many items you require. Tell us how many guests you have and we will pull together a quote based on your favourite items and your numbers We have many years of experience in making wedding cakes, so that you can trust that your ideas will become reality. No idea is too big or too small. At Blossom Bakery it is important to us that the service you receive from us is just as special as your wedding day. We will listen to your ideas, sketch a design for you to review and, most importantly, ensure your ideas and vision is successfully delivered. We ensure all of our clients receive a professional, friendly and reliable service when planning their wedding cake. The Vintage style Lambeth cakes are one of the latest trends this year. Choose from a single heart cake, tiered heart cake, circular, square or rectangle. There's so many different versions to this style cake. All pipped with fancy swirl and edged buttercream to give that vintage feel. We can add bows, cherries and add wording to the centre to create that real show stopper. 12 inch Heart/circle – serves 75-100 – £300 10 inch Heart/circle serves 50-75- £250 8 inch Heart/circle serves -30-35 -£200 3 Tiered Heart/ circle- From £475 2 Tiered Heart/ circle- From £350 We specialise in sponge cakes with either naked, ribbed or fully-covered buttercream buttercream finish. All of our prices include delivery and set-up within 20 miles from Chelmsford.For venues further afield a small additional cost can be discussed. Try a selection of different flavoured cakes with one of our Taster cupcake boxes. These are available in boxes of Six- £20, Twelve- £35 Flavours.. Dietary requirements We make a wide range of items suitable for different allergens. GF- Gluten free, DF- Diary free & V- Vegan. We can also combine several allergens Last minute …. If we have availability then we are happy to accommodate your order, even if it is just a couple of days away. If you need a wedding cake in a hurry, then please contact us. The price of your wedding cake will depend on a number of factors including the size, design and artistry involved. Please see below an estimated guide on our prices. The size of the slice of cake and how the cake is cut really depends on how many slices you get out of each cake. All of our individual cakes are made with 3 layers of sponge. As a guide please see below for an estimate on how many slices you can get out of each cake. In addition to making your wedding cake we can also make your wedding favours for you and your wedding guests to enjoy. These include cupcakes, personalised iced biscuits and macarons. These make the perfect addition to your guests place setting on the table. We are able to co-ordinate these with your wedding cake and colour theme. All of our favours are individually presented in a selection of beautiful packaging for you to choose from. These can also be personalised.
