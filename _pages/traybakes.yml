slug: traybakes
title: Traybakes
intro: Traybakes are perfect if you don't need a whole cake, but you require more than a cupcake.They are ideal for smaller birthday gatherings and suitable for children's party bags. we can also personalise these with a special message. We have a wide range of delicious sponge based flavours, buttercreams and designs. We also make a selection of other Traybakes, Millionaire's Shortbread/Flapjack, Old-School Sprinkle Cake, Rocky Road, Tiffin, Brownies & Blondes. All our tray bakes measure 30cm x 18cm. They serve 12 people, alternatively, we can also adapt them into 24 smaller size portions. These are perfect for tearoom and coffee shops serving afternoon tea. All of our tray bakes can be personalised for an additional £5. Gluten free (GF) on request and a selection can be adapted for vegan diets (V)
