title: Handmade Biscuits
intro: Biscuits – Blossom Bakery Skip to content One of the most marvellous things about biscuits, apart from eating them, is their flexibility Screenshot Screenshot Our handmade all-butter biscuits are baked with love from start to finish. Each order is completely unique and tailored for you to make your individual occasion that little bit more special; Baby Showers, Weddings, Birthdays and Anniversaries to name but a few. Our biscuit recipe is delicious, they are chewy with a sweet syrupy taste. Our standard flavour is the vanilla, whilst our Christmas themed biscuits can be baked with mild mixed spices. Each biscuit is wrapped individually and heat sealed to preserve its freshness. Our biscuits start from £2.50 each, they are also available gluten-free if required..
